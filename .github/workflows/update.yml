name: Update KWCI data

on:
  schedule:
    - cron: "0 21 1 * *"   # 매월 1일 21:00 UTC = 2일 06:00 KST
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas requests pytrends

      - name: Run pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          KF_API_URL: ${{ secrets.KF_API_URL }}
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: |
          python kwci_pipeline/run_pipeline.py
          python kwci_pipeline/history.py
          python kwci_pipeline/momentum.py
          cp data/kwci_latest.json data/history.json data/momentum_latest.json .

      - name: Commit and push
        run: |
          git config user.name "kwci-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kwci_latest.json history.json momentum_latest.json data
          git diff --staged --quiet || (git commit -m "Auto-update KWCI data" && git push)
